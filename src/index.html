<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TravelSwipe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <h1 id="page-title">TravelSwipe</h1>
  <div class="right">
    <button id="btn-map" class="btn">🗺️ View Map</button>
  </div>
</header>

<section id="city-screen">
  <h2>Select a city</h2>
  <div class="city-buttons">
    <button class="city-btn" data-city="London">London</button>
    <button class="city-btn" data-city="New York">New York</button>
    <button class="city-btn" data-city="Tokyo">Tokyo</button>
    <button class="city-btn" data-city="Istanbul">Istanbul</button>
  </div>
</section>

<!-- Controls now sits nicely inside the topbar on the right -->
<div class="container" id="controls-wrap" style="display:none;">
  <div id="controls"></div>
</div>

<main id="app" class="container" style="display:none;">
  <div class="app-grid">
    <div>
      <div id="card-container"></div>
    </div>

    <aside class="itinerary-panel">
      <h3>My Itinerary</h3>
      <p class="sub">Swipe right to save places. Use Undo if needed.</p>
      <ul id="itinerary-list"></ul>
    </aside>
  </div>
</main>
<!-- Chat Assistant -->
<button id="chat-fab" aria-label="Open chat assistant" title="Help">
  💬
</button>

<section id="chat-panel" class="chat-panel" aria-label="Chat assistant" style="display:none;">
  <div class="chat-header">
    <div>
      <strong>TravelSwipe Assistant</strong><br />
      <span class="chat-subtitle">Quick help & tips</span>
      <button id="chat-help" class="chat-help">Suggested questions</button>
    </div>
    <button id="chat-close" class="chat-close" aria-label="Close">✕</button>
  </div>

  <div id="chat-messages" class="chat-messages"></div>

  <div class="chat-suggestions" id="chat-suggestions"></div>

  <div class="chat-input">
    <input id="chat-text" type="text" placeholder="Ask something…" />
    <button id="chat-send">Send</button>
  </div>
</section>
<!-- Days Modal -->
<div id="days-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; display:none; align-items:center; justify-content:center;">
  <div style="background:#0f172a; border:1px solid rgba(248,250,252,0.2); border-radius:16px; padding:28px; text-align:center; min-width:280px;">
    <h3 style="margin:0 0 14px;">How many days is your trip?</h3>
    <input id="tripDays" type="number" min="1" max="14" value="1"
           style="width:80px; padding:10px; border-radius:10px; border:1px solid #334155; background:#0b1220; color:#f8fafc; text-align:center; font-size:1.1rem; outline:none;" />
    <div style="margin-top:18px; display:flex; gap:10px; justify-content:center;">
      <button onclick="confirmDaysAndStart()" class="btn">Start</button>
      <button onclick="closeDaysModal()" class="btn secondary">Cancel</button>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="travel-data.js"></script>
<script src="main.js"></script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- browser tab title for the map page -->
  <title>TravelSwipe - Map</title>

  <!-- main shared stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <!-- leaflet map css + js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
      /* main map box */
      #map {
          height: 100%;
      }

      /* top control bars on the map page */
      .mapbar{
          display:flex;
          align-items:center;
          justify-content:space-between;
          padding: 0 24px 16px;
          gap: 16px;
          flex-wrap: wrap;
      }

      /* left side items inside each mapbar */
      .mapbar .left{
          display:flex;
          align-items:center;
          gap: 14px;
          flex-wrap: wrap;
      }

      /* shared look for top links and buttons */
      .mapbar a, .mapbar button{
          padding: 18px 28px;
          border-radius: 16px;
          border: 1px solid rgba(248,250,252,0.18);
          background: #111c32;
          color: #f8fafc;
          cursor: pointer;
          text-decoration:none;
          display:inline-block;
          font-family: 'DM Sans', sans-serif;
          font-size: 1.2rem;
          font-weight: 600;
          transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
      }

      /* small hover animation */
      .mapbar a:hover, .mapbar button:hover{
          background:#1b2a4a;
          transform: translateY(-2px);
          box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      }

      /* text that shows city and route summary */
      .meta{
          font-size: 1.15rem;
          font-weight: 600;
          opacity: 0.85;
      }

      /* day count input */
      #days-input{
          width: 100px;
          padding: 18px 16px;
          border-radius: 16px;
          border: 1px solid rgba(248,250,252,0.18);
          background: #0b1220;
          color: #f8fafc;
          font-family: 'DM Sans', sans-serif;
          font-size: 1.2rem;
          outline: none;
          text-align: center;
      }

      /* walking / driving dropdown */
      #travel-mode{
          padding: 18px 16px;
          border-radius: 16px;
          border: 1px solid rgba(248,250,252,0.18);
          background: #0b1220;
          color: #f8fafc;
          font-family: 'DM Sans', sans-serif;
          font-size: 1.2rem;
          outline: none;
          cursor: pointer;
      }

      /* small labels like Mode and Days */
      .label{
          font-size: 1.2rem;
          font-weight: 700;
          opacity: 0.85;
      }

      /* buttons for each trip day */
      .day-btn{
          font-size: 1.2rem !important;
          padding: 18px 28px !important;
      }

      /* active selected day button */
      .day-btn.active{
          background:#1b2a4a;
          border-color: rgba(59,130,246,0.35);
          box-shadow: 0 0 0 1px rgba(59,130,246,0.15);
      }

      /* match heading font to rest of the app */
      .topbar h1{
          font-family: 'Playfair Display', serif;
      }

      /* timeline item layout */
      .tl-item{
          display: flex;
          gap: 14px;
          align-items: flex-start;
      }

      /* timeline left line section */
      .tl-line{
          display: flex;
          flex-direction: column;
          align-items: center;
          width: 24px;
          flex-shrink: 0;
      }

      /* normal stop dot */
      .tl-dot{
          width: 14px;
          height: 14px;
          border-radius: 50%;
          background: #3b82f6;
          border: 2px solid #60a5fa;
          flex-shrink: 0;
      }

      /* green start point dot */
      .tl-dot.start{
          background: #22c55e;
          border-color: #4ade80;
      }

      /* yellow priority place dot */
      .tl-dot.priority{
          background: #eab308;
          border-color: #facc15;
      }

      /* line between timeline dots */
      .tl-connector{
          width: 2px;
          flex: 1;
          min-height: 30px;
          background: rgba(248,250,252,0.15);
      }

      .tl-info{
          padding-bottom: 8px;
      }

      /* main place name in timeline */
      .tl-name{
          font-size: 1.05rem;
          font-weight: 600;
          color: #f8fafc;
      }

      /* category text under place name */
      .tl-cat{
          font-size: 0.85rem;
          color: rgba(248,250,252,0.5);
      }

      /* little distance/time row between stops */
      .tl-walk{
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 6px 0 6px 0;
          margin-left: 11px;
      }

      .tl-walk-line{
          width: 2px;
          height: 24px;
          background: rgba(248,250,252,0.1);
      }

      .tl-walk-text{
          font-size: 0.85rem;
          color: rgba(248,250,252,0.4);
          font-style: italic;
      }

      /* total route summary at bottom of timeline */
      .tl-total{
          margin-top: 16px;
          padding: 14px;
          border-radius: 12px;
          background: rgba(248,250,252,0.05);
          border: 1px solid rgba(248,250,252,0.1);
          font-size: 1rem;
          font-weight: 600;
          color: rgba(248,250,252,0.75);
          text-align: center;
      }

      /* small scrollbar styling for the timeline */
      #timeline-panel::-webkit-scrollbar{ width: 4px; }
      #timeline-panel::-webkit-scrollbar-thumb{ background: rgba(248,250,252,0.15); border-radius:99px; }

      /* hide timeline on smaller screens */
      @media (max-width: 900px){
          #timeline-panel{ display: none; }
      }

      /* light mode overrides for map page */
      [data-theme="light"] .label {
          color: #1a1a2e !important;
          opacity: 1;
      }

      [data-theme="light"] .meta {
          color: #1a1a2e !important;
          opacity: 1;
      }

      [data-theme="light"] .mapbar a,
      [data-theme="light"] .mapbar button {
          background: #1e3a5f;
          color: #f8fafc;
          border-color: rgba(30,58,95,0.3);
      }

      [data-theme="light"] .mapbar a:hover,
      [data-theme="light"] .mapbar button:hover {
          background: #264d7a;
      }

      [data-theme="light"] #days-input,
      [data-theme="light"] #travel-mode {
          background: #ffffff;
          color: #1a1a2e;
          border-color: rgba(26,26,46,0.2);
      }
  </style>
</head>
<body>

<!-- top bar for map page title + theme toggle -->
<header class="topbar">
  <h1>Itinerary Map</h1>

  <!-- inline theme toggle just for this page -->
  <button id="btn-theme" onclick="
    const current = localStorage.getItem('theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    this.textContent = next === 'light' ? '☀️' : '🌙';
  " style="padding:12px 16px; border-radius:14px; border:1px solid rgba(248,250,252,0.18); background:#111c32; color:#f8fafc; cursor:pointer; font-size:1.1rem;">🌙</button>
</header>

<!-- first top bar with nav and map actions -->
<div class="mapbar">
  <div class="left">
    <a href="index.html">← Back</a>
    <button id="btn-export-pdf" title="Download your itinerary as a PDF">📄 Export PDF</button>
    <button id="btn-clear" title="Removes all saved attractions and resets your itinerary">Clear Itinerary</button>
    <button id="btn-fit" title="Zooms the map to show all your saved attractions">Fit to Markers</button>
    <button id="btn-set-start" title="Click this then click anywhere on the map to set your starting point (e.g. your hotel)">Set Start</button>
    <button id="btn-clear-start" title="Removes your custom starting point">Clear Start</button>
  </div>

  <!-- route summary text -->
  <div class="meta" id="meta"></div>
</div>

<!-- second top bar with day tabs + mode/day controls -->
<div class="mapbar" style="padding-top:0;">
  <div class="left" id="daybar"></div>

  <div class="left">
    <span class="label" style="color: var(--text);">Mode</span>
    <select id="travel-mode">
      <option value="walking">🚶 Walking</option>
      <option value="driving">🚗 Driving</option>
    </select>

    <span class="label" style="margin-left:12px; color: var(--text);">Days</span>
    <input id="days-input" type="number" min="1" max="14" />
    <button id="btn-apply-days">Apply</button>
  </div>
</div>

<!-- main map + timeline split layout -->
<div style="display:flex; gap:0; height:78vh; margin:18px;">
  <!-- interactive leaflet map -->
  <div id="map" style="flex:1; border-radius:18px 0 0 18px; overflow:hidden; border:1px solid rgba(248,250,252,0.15); border-right:none;"></div>

  <!-- right side schedule panel -->
  <div id="timeline-panel" style="width:340px; background:rgba(15,23,42,0.85); border:1px solid rgba(248,250,252,0.15); border-radius:0 18px 18px 0; overflow-y:auto; padding:20px 16px;">
    <h3 style="font-family:'Playfair Display',serif; font-size:1.3rem; margin:0 0 16px;">Day Schedule</h3>
    <div id="timeline-content"></div>
  </div>
</div>


<!-- floating chat button -->
<button id="chat-fab" aria-label="Open chat assistant" title="Help">
  💬
</button>

<!-- map page chat assistant -->
<section id="chat-panel" class="chat-panel" aria-label="Chat assistant" style="display:none;">
  <div class="chat-header">
    <div>
      <strong>TravelSwipe Assistant</strong><br />
      <span class="chat-subtitle">Map help & tips</span>
      <button id="chat-help" class="chat-help">Suggested questions</button>
    </div>

    <button id="chat-close" class="chat-close" aria-label="Close">✕</button>
  </div>

  <div id="chat-messages" class="chat-messages"></div>
  <div class="chat-suggestions" id="chat-suggestions"></div>

  <div class="chat-input">
    <input id="chat-text" type="text" placeholder="Ask something…" />
    <button id="chat-send">Send</button>
  </div>
</section>


<!-- firebase + local files -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="travel-data.js"></script>

<script>
  // currently selected city from storage
  const selectedCity = localStorage.getItem("selectedCity") || "London";

  // top meta text element
  const metaEl = document.getElementById("meta");


  // reads liked attractions from storage
  function readLikedAttractions() {
    try {
      return JSON.parse(localStorage.getItem("likedAttractions") || "[]");
    } catch {
      return [];
    }
  }

  let liked = [];
  let points = [];


  // refreshes local arrays from storage and keeps only valid map points
  function refreshStoredPoints() {
    liked = readLikedAttractions();

    points = liked
      .filter(p => p && p.lat !== undefined && p.lng !== undefined)
      .map(p => ({
        ...p,
        lat: Number(p.lat),
        lng: Number(p.lng)
      }))
      .filter(p => Number.isFinite(p.lat) && Number.isFinite(p.lng));

    metaEl.textContent = `${selectedCity} • ${liked.length} saved place(s)`;
  }

  refreshStoredPoints();


  // default map centers for each city
  const fallbackCenter = {
    London: [51.5074, -0.1278],
    "New York": [40.7128, -74.0060],
    Tokyo: [35.6762, 139.6503],
    Krakow: [50.0647, 19.9450]
  };

  const center = fallbackCenter[selectedCity] || [51.5074, -0.1278];

  // create leaflet map
  const map = L.map("map").setView(center, 12);

  // openstreetmap tile layer
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);


  // number of trip days from storage
  let tripDays = Number(localStorage.getItem("tripDays") || "1");
  if (!Number.isFinite(tripDays) || tripDays < 1) tripDays = 1;
  tripDays = Math.min(14, tripDays);

  const daysInput = document.getElementById("days-input");
  daysInput.value = String(tripDays);

  // main working state for map page
  let activeDay = 1;
  let dayPlan = [];
  let markersLayer = L.layerGroup().addTo(map);
  let routeLine = null;
  let startMarker = null;
  let isPlacingStart = false;
  const startKey = `startPoint:${selectedCity}`;

  // ----- Helpers -----

  // simple distance helper used by algorithms
  function euclid(a, b){
    const dx = a.lng - b.lng;
    const dy = a.lat - b.lat;
    return Math.sqrt(dx*dx + dy*dy);
  }

  // loads saved custom start point for current city
  function loadStartPoint() {
    try {
      const raw = localStorage.getItem(startKey);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (typeof obj.lat !== "number" || typeof obj.lng !== "number") return null;
      return { lat: obj.lat, lng: obj.lng };
    } catch {
      return null;
    }
  }

  // saves custom start point
  function saveStartPoint(latlng) {
    localStorage.setItem(startKey, JSON.stringify({ lat: latlng.lat, lng: latlng.lng }));
  }

  // clears custom start point
  function clearStartPoint() {
    localStorage.removeItem(startKey);
    if (startMarker) {
      map.removeLayer(startMarker);
      startMarker = null;
    }
  }

  // creates or moves the draggable start marker
  function setStartMarker(latlng) {
    if (!startMarker) {
      startMarker = L.marker([latlng.lat, latlng.lng], { draggable: true }).addTo(map);
      startMarker.bindPopup("<b>Start point</b><br>Drag to adjust.").openPopup();

      startMarker.on("dragend", () => {
        const p = startMarker.getLatLng();
        saveStartPoint(p);
        drawDay(activeDay);
      });
    } else {
      startMarker.setLatLng([latlng.lat, latlng.lng]);
    }

    saveStartPoint(latlng);
  }

  // groups attractions into nearby day clusters
  function clusterByCloseness(pts, k) {
    if (!pts || pts.length === 0) return [];
    k = Math.max(1, Math.min(k, pts.length));

    // start with each point in its own cluster
    let clusters = pts.map(p => [p]);

    // merge closest clusters until we have k groups
    while (clusters.length > k) {
      let bestI = 0, bestJ = 1, bestD = Infinity;

      for (let i = 0; i < clusters.length; i++) {
        for (let j = i + 1; j < clusters.length; j++) {
          const ci = centroidOf(clusters[i]);
          const cj = centroidOf(clusters[j]);
          const d = euclid(ci, cj);
          if (d < bestD) {
            bestD = d;
            bestI = i;
            bestJ = j;
          }
        }
      }

      clusters[bestI] = clusters[bestI].concat(clusters[bestJ]);
      clusters.splice(bestJ, 1);
    }

    // balance the clusters so no day is overloaded
    const maxSize = Math.ceil(pts.length / k);

    let changed = true;
    let passes = 0;
    while (changed && passes < 20) {
      changed = false;
      passes++;

      for (let i = 0; i < clusters.length; i++) {
        if (clusters[i].length <= maxSize) continue;

        // this cluster is too big find the point furthest from its centre
        const cent = centroidOf(clusters[i]);
        let worstIdx = 0;
        let worstD = 0;
        for (let p = 0; p < clusters[i].length; p++) {
          const d = euclid(clusters[i][p], cent);
          if (d > worstD) { worstD = d; worstIdx = p; }
        }

        // find the nearest cluster that still has room
        const point = clusters[i][worstIdx];
        let bestTarget = -1;
        let bestTargetD = Infinity;
        for (let j = 0; j < clusters.length; j++) {
          if (j === i) continue;
          if (clusters[j].length >= maxSize) continue;
          const d = euclid(point, centroidOf(clusters[j]));
          if (d < bestTargetD) { bestTargetD = d; bestTarget = j; }
        }

        if (bestTarget >= 0) {
          clusters[bestTarget].push(point);
          clusters[i].splice(worstIdx, 1);
          changed = true;
        }
      }
    }

    // final improvement step swaps points if it makes both groups tighter
    for (let pass = 0; pass < 10; pass++) {
      let swapped = false;
      for (let i = 0; i < clusters.length; i++) {
        for (let j = i + 1; j < clusters.length; j++) {
          for (let ai = 0; ai < clusters[i].length; ai++) {
            for (let bi = 0; bi < clusters[j].length; bi++) {
              const centI = centroidOf(clusters[i]);
              const centJ = centroidOf(clusters[j]);

              const currentCost = euclid(clusters[i][ai], centI) + euclid(clusters[j][bi], centJ);
              const swapCost = euclid(clusters[j][bi], centI) + euclid(clusters[i][ai], centJ);

              if (swapCost < currentCost - 0.0001) {
                const temp = clusters[i][ai];
                clusters[i][ai] = clusters[j][bi];
                clusters[j][bi] = temp;
                swapped = true;
              }
            }
          }
        }
      }
      if (!swapped) break;
    }

    return clusters.map((places, idx) => ({
      day: idx + 1,
      centroid: centroidOf(places),
      places: places
    }));
  }

  // finds the centre of a cluster
  function centroidOf(list) {
    const n = list.length || 1;
    const lat = list.reduce((s, p) => s + p.lat, 0) / n;
    const lng = list.reduce((s, p) => s + p.lng, 0) / n;
    return { lat, lng };
  }

  // chooses a sensible start point within a group
  function pickStartClosestToCentroid(list){
    if (!list || list.length === 0) return null;
    const c = centroidOf(list);
    let best = list[0];
    let bestD = Infinity;
    for (const p of list){
      const d = euclid(p, c);
      if (d < bestD){ bestD = d; best = p; }
    }
    return best;
  }

  // basic nearest neighbour route order
  function nearestNeighborOrder(list){
    if (!list || list.length <= 2) return (list || []).slice();

    const remaining = list.slice();
    const ordered = [];

    const start = pickStartClosestToCentroid(remaining);
    ordered.push(start);
    remaining.splice(remaining.findIndex(p => p.id === start.id), 1);

    while (remaining.length){
      const last = ordered[ordered.length - 1];
      let bestIdx = 0;
      let bestD = Infinity;

      for (let i = 0; i < remaining.length; i++){
        const d = euclid(last, remaining[i]);
        if (d < bestD){ bestD = d; bestIdx = i; }
      }
      ordered.push(remaining.splice(bestIdx, 1)[0]);
    }
    return ordered;
  }

  // total route length helper
  function routeLength(list){
    let sum = 0;
    for (let i = 0; i < list.length - 1; i++){
      sum += euclid(list[i], list[i+1]);
    }
    return sum;
  }

  // improves a route by removing bad crossings
  function twoOptImprove(route, maxPasses = 8){
    const r = route.slice();
    if (r.length < 4) return r;

    let improved = true;
    let passes = 0;

    while (improved && passes < maxPasses){
      improved = false;
      passes++;

      for (let i = 1; i < r.length - 2; i++){
        for (let k = i + 1; k < r.length - 1; k++){
          const a = r[i - 1], b = r[i];
          const c = r[k], d = r[k + 1];

          const current = euclid(a,b) + euclid(c,d);
          const swapped = euclid(a,c) + euclid(b,d);

          if (swapped < current){
            const segment = r.slice(i, k + 1).reverse();
            r.splice(i, segment.length, ...segment);
            improved = true;
          }
        }
      }
    }

    return r;
  }

  // gets best route order without a custom start point
  function getOptimizedVisitOrder(list){
    const nn = nearestNeighborOrder(list);
    const improved = twoOptImprove(nn);
    return routeLength(improved) <= routeLength(nn) ? improved : nn;
  }

  // gets best route order when user sets a start point
  function getOptimizedVisitOrderFromStart(list, startLatLng) {
    if (!startLatLng) return getOptimizedVisitOrder(list);

    const startPoint = { id: "__start__", lat: startLatLng.lat, lng: startLatLng.lng };

    const nn = (function nearestNeighborFromStart() {
      if (!list || list.length === 0) return [startPoint];

      const remaining = list.slice();
      const ordered = [startPoint];

      while (remaining.length) {
        const last = ordered[ordered.length - 1];
        let bestIdx = 0;
        let bestD = Infinity;

        for (let i = 0; i < remaining.length; i++) {
          const d = euclid(last, remaining[i]);
          if (d < bestD) { bestD = d; bestIdx = i; }
        }
        ordered.push(remaining.splice(bestIdx, 1)[0]);
      }
      return ordered;
    })();

    // 2-opt version that keeps the start point fixed
    const improved = (function twoOptFixedStart(route, maxPasses = 8) {
      const r = route.slice();
      if (r.length < 5) return r;

      let improved = true;
      let passes = 0;

      while (improved && passes < maxPasses) {
        improved = false;
        passes++;

        for (let i = 2; i < r.length - 2; i++) {
          for (let k = i + 1; k < r.length - 1; k++) {
            const a = r[i - 1], b = r[i];
            const c = r[k], d = r[k + 1];

            const current = euclid(a, b) + euclid(c, d);
            const swapped = euclid(a, c) + euclid(b, d);

            if (swapped < current) {
              const segment = r.slice(i, k + 1).reverse();
              r.splice(i, segment.length, ...segment);
              improved = true;
            }
          }
        }
      }
      return r;
    })(nn);

    return improved;
  }

  // clears markers and existing route from the map
  function clearMap(){
    markersLayer.clearLayers();
    if (routeLine) map.removeLayer(routeLine);
    routeLine = null;
  }

  // zooms map so all current places are visible
  function fitToList(list){
    if (!list || list.length === 0) return;

    const b = list.map(p => [p.lat, p.lng]);

    const start = loadStartPoint();
    if (start) b.push([start.lat, start.lng]);

    map.fitBounds(L.latLngBounds(b), { padding: [40, 40] });
  }

  // asks OSRM for a route and draws it on the map
  async function drawRouteForList(list){
    const start = loadStartPoint();
    const totalPoints = (list ? list.length : 0) + (start ? 1 : 0);
    if (totalPoints < 2) return;

    const ordered = getOptimizedVisitOrderFromStart(list, start);

    const coords = ordered.map(p => `${p.lng},${p.lat}`).join(";");
    const mode = document.getElementById("travel-mode").value || "walking";
    const url = `https://router.project-osrm.org/route/v1/${mode}/${coords}?overview=full&geometries=geojson`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      if (!data.routes || !data.routes[0] || !data.routes[0].geometry) return;

      if (routeLine) map.removeLayer(routeLine);

      routeLine = L.geoJSON(data.routes[0].geometry, {
        style: { weight: 5, opacity: 0.85 }
      }).addTo(map);

      const dMeters = data.routes[0].distance;
      const mode2 = document.getElementById("travel-mode").value || "walking";
      const speedMps = mode2 === "driving" ? 8.33 : 1.3889;
      const mins = Math.round((dMeters / speedMps) / 60);
      const km = (dMeters / 1000).toFixed(2);
      const modeLabel = mode2 === "driving" ? "drive" : "walk";

      metaEl.textContent = `${selectedCity} • ${liked.length} saved • Day ${activeDay}: ${km} km (~${mins} min ${modeLabel})`;
    } catch (e) {
      console.error("Route error:", e);
    }
  }

  // draws one specific day on the map
  function drawDay(dayNumber){
    clearMap();

    const dayObj = dayPlan.find(d => d.day === dayNumber);
    if (!dayObj || dayObj.places.length === 0){
      metaEl.textContent = `${selectedCity} • ${liked.length} saved • Day ${dayNumber}: no places`;
      return;
    }

    // add marker and popup for each place
    dayObj.places.forEach((p, i) => {
      const marker = L.marker([p.lat, p.lng]).addTo(markersLayer);
      const safeId = encodeURIComponent(p.id);

      marker.bindPopup(`
  <div style="max-width:220px;">
    <img src="${p.image || ''}" style="width:100%; height:120px; object-fit:cover; border-radius:8px; margin-bottom:8px;" />
    <b>${i + 1}. ${p.name}</b><br>
    <span style="opacity:0.7; font-size:12px;">${p.category || ""}</span><br>
    <span style="font-size:13px; line-height:1.4;">${p.description || ""}</span><br><br>
    <a href="index.html" class="open-in-app" data-id="${safeId}" style="color:#3b82f6; font-weight:600;">Open in app</a>
  </div>
`);

      marker.on("popupopen", () => {
        const link = document.querySelector('.open-in-app[data-id="' + safeId + '"]');
        if (!link) return;

        // sends user back to same place on main page
        link.addEventListener("click", () => {
          localStorage.setItem("jumpToAttractionId", String(p.id));
          localStorage.setItem("selectedCity", selectedCity);
        });
      });
    });

    fitToList(dayObj.places);
    drawRouteForList(dayObj.places);
    renderTimeline(dayNumber);
  }

  // rebuilds day tabs at the top
  function renderDayBar(){
    const daybar = document.getElementById("daybar");
    daybar.innerHTML = "";

    dayPlan.forEach((d) => {
      const btn = document.createElement("button");
      btn.className = "day-btn" + (d.day === activeDay ? " active" : "");
      btn.textContent = `Day ${d.day} (${d.places.length})`;

      btn.onclick = () => {
        activeDay = d.day;
        renderDayBar();
        drawDay(activeDay);
      };

      daybar.appendChild(btn);
    });

    if (dayPlan.length === 0) {
      const span = document.createElement("span");
      span.style.opacity = "0.8";
      span.textContent = "No places to plan yet.";
      daybar.appendChild(span);
    }
  }


  // apply saved theme on map page
  const savedTheme = localStorage.getItem("theme") || "dark";
  document.documentElement.setAttribute("data-theme", savedTheme);
  const themeToggle = document.getElementById("btn-theme");
  if (themeToggle) themeToggle.textContent = savedTheme === "light" ? "☀️" : "🌙";


  // builds the timeline panel for the active day
  async function renderTimeline(dayNumber) {
    const container = document.getElementById("timeline-content");
    if (!container) return;

    const dayObj = dayPlan.find(d => d.day === dayNumber);
    if (!dayObj || dayObj.places.length === 0) {
      container.innerHTML = '<p style="opacity:0.5;">No places for this day.</p>';
      return;
    }

    const priorities = JSON.parse(localStorage.getItem("priorities") || "[]");
    const start = loadStartPoint();
    const ordered = getOptimizedVisitOrderFromStart(dayObj.places, start);

    // get rough distances between consecutive stops
    const distances = [];
    for (let i = 0; i < ordered.length - 1; i++) {
      const a = ordered[i];
      const b = ordered[i + 1];
      const dx = (a.lng - b.lng) * 111320 * Math.cos(a.lat * Math.PI / 180);
      const dy = (a.lat - b.lat) * 110540;
      const meters = Math.sqrt(dx * dx + dy * dy);
      distances.push(meters);
    }

    const mode = document.getElementById("travel-mode").value || "walking";
    const speed = mode === "driving" ? 8.33 : 1.3889;

    let html = "";
    let totalDist = 0;

    ordered.forEach((place, i) => {
      const isStart = place.id === "__start__";
      const isPri = priorities.includes(place.id);
      const dotClass = isStart ? "start" : isPri ? "priority" : "";

      html += `<div class="tl-item">`;
      html += `<div class="tl-line">`;
      html += `<div class="tl-dot ${dotClass}"></div>`;
      if (i < ordered.length - 1) html += `<div class="tl-connector"></div>`;
      html += `</div>`;
      html += `<div class="tl-info">`;
      html += `<div class="tl-name">${isStart ? "📍 Start Point" : (isPri ? "⭐ " : "") + place.name}</div>`;
      if (!isStart) html += `<div class="tl-cat">${place.category || ""}</div>`;
      html += `</div>`;
      html += `</div>`;

      if (i < distances.length) {
        const dist = distances[i];
        totalDist += dist;
        const mins = Math.round((dist / speed) / 60);
        const modeLabel = mode === "driving" ? "drive" : "walk";
        html += `<div class="tl-walk">`;
        html += `<div class="tl-walk-line"></div>`;
        html += `<span class="tl-walk-text">${Math.round(dist)}m • ~${mins} min ${modeLabel}</span>`;
        html += `</div>`;
      }
    });

    const totalKm = (totalDist / 1000).toFixed(1);
    const totalMins = Math.round((totalDist / speed) / 60);
    const modeLabel = mode === "driving" ? "drive" : "walk";
    html += `<div class="tl-total">${totalKm} km total • ~${totalMins} min ${modeLabel}</div>`;

    container.innerHTML = html;
  }


  // rebuilds the full plan after changes to days or data
  function rebuildPlan(){
    refreshStoredPoints();
    dayPlan = clusterByCloseness(points, tripDays);
    activeDay = 1;
    renderDayBar();

    if (dayPlan.length > 0) {
      drawDay(activeDay);
      renderTimeline(activeDay);
    } else {
      metaEl.textContent = `${selectedCity} • ${liked.length} saved place(s)`;
      const container = document.getElementById("timeline-content");
      if (container) container.innerHTML = '<p style="opacity:0.5;">Like some attractions first.</p>';
    }
  }

  // ----- Buttons -----

  // zoom to current day's places
  document.getElementById("btn-fit").onclick = () => {
    const dayObj = dayPlan.find(d => d.day === activeDay);
    if (dayObj) fitToList(dayObj.places);
  };

  // clear itinerary completely
  document.getElementById("btn-clear").onclick = () => {
    localStorage.setItem("likedAttractions", "[]");
    if (window.TravelSwipeDB) {
      window.TravelSwipeDB.saveCurrentSession();
    }
    window.location.reload();
  };

  // apply new day count and rebuild the plan
  document.getElementById("btn-apply-days").onclick = () => {
    const v = Math.max(1, Math.min(14, Number(daysInput.value || 1)));
    tripDays = v;
    localStorage.setItem("tripDays", String(v));
    rebuildPlan();

    if (window.TravelSwipeDB) {
      window.TravelSwipeDB.saveCurrentSession();
    }
  };

  // restore saved walking/driving mode
  const travelModeSelect = document.getElementById("travel-mode");
  const savedMode = localStorage.getItem("travelMode") || "walking";
  travelModeSelect.value = savedMode;

  // recalc route when mode changes
  travelModeSelect.addEventListener("change", () => {
    localStorage.setItem("travelMode", travelModeSelect.value);
    if (window.TravelSwipeDB) window.TravelSwipeDB.saveCurrentSession();
    drawDay(activeDay);
  });


  // initial build when page loads
  rebuildPlan();

  if (points.length === 0) {
    alert("No saved places with coordinates yet. Like some attractions first.");
  }

  // restore saved start point if one exists
  const savedStart = loadStartPoint();
  if (savedStart) setStartMarker(savedStart);

  // helper popup for setting start point
  const startMsg = document.createElement("div");
  startMsg.id = "start-msg";
  startMsg.style.cssText = "display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#0f172a; border:1px solid rgba(248,250,252,0.2); border-radius:18px; padding:28px 36px; text-align:center; z-index:300; box-shadow:0 20px 60px rgba(0,0,0,0.5);";
  startMsg.innerHTML = '<p style="font-size:1.2rem; font-weight:600; margin:0 0 8px;">Click anywhere on the map</p><p style="opacity:0.6; margin:0 0 16px;">This will set your starting point (e.g. your hotel)</p><button onclick="document.getElementById(\'start-msg\').style.display=\'none\'" style="padding:12px 28px; border-radius:12px; border:1px solid rgba(248,250,252,0.18); background:#111c32; color:#f8fafc; cursor:pointer; font-size:1rem;">Got it</button>';
  document.body.appendChild(startMsg);

  // button that toggles placing start point mode
  document.getElementById("btn-set-start").onclick = () => {
    isPlacingStart = !isPlacingStart;
    const btn = document.getElementById("btn-set-start");
    if (isPlacingStart) {
      btn.textContent = "📍 Click the map...";
      btn.style.background = "#1b2a4a";

      // show instruction popup
      let popup = document.getElementById("start-popup");
      if (!popup) {
        popup = document.createElement("div");
        popup.id = "start-popup";
        popup.style.cssText = "position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#0f172a; border:1px solid rgba(248,250,252,0.2); border-radius:18px; padding:28px 36px; text-align:center; z-index:300; box-shadow:0 20px 60px rgba(0,0,0,0.5);";
        popup.innerHTML = '<p style="font-size:1.2rem; font-weight:600; margin:0 0 8px;">Click anywhere on the map</p><p style="opacity:0.6; margin:0 0 16px;">This sets your starting point, for example your hotel or where you are staying.</p><button id="start-popup-close" style="padding:12px 28px; border-radius:12px; border:1px solid rgba(248,250,252,0.18); background:#111c32; color:#f8fafc; cursor:pointer; font-size:1rem;">Got it</button>';
        document.body.appendChild(popup);
        document.getElementById("start-popup-close").onclick = () => { popup.style.display = "none"; };
      } else {
        popup.style.display = "block";
      }
    } else {
      btn.textContent = "Set Start";
      btn.style.background = "";
    }
  };

  // clear custom start point
  document.getElementById("btn-clear-start").onclick = () => {
    clearStartPoint();
    drawDay(activeDay);
  };

  // place start marker when map is clicked in placing mode
  map.on("click", (e) => {
    if (!isPlacingStart) return;
    setStartMarker(e.latlng);
    isPlacingStart = false;
    const btn = document.getElementById("btn-set-start");
    if (btn) { btn.textContent = "Set Start"; btn.style.background = ""; }
    const popup = document.getElementById("start-popup");
    if (popup) popup.style.display = "none";
    drawDay(activeDay);
  });

  // Map Chat Assistant
  (function initMapChat(){
    const fab = document.getElementById("chat-fab");
    const panel = document.getElementById("chat-panel");
    const closeBtn = document.getElementById("chat-close");
    const messagesEl = document.getElementById("chat-messages");
    const inputEl = document.getElementById("chat-text");
    const sendBtn = document.getElementById("chat-send");
    const suggEl = document.getElementById("chat-suggestions");
    const helpBtn = document.getElementById("chat-help");

    if (!fab || !panel || !messagesEl || !inputEl || !sendBtn || !suggEl || !closeBtn) return;

    // map-specific faq data
    const QA = [
      {
        q: "What does Set Start do?",
        keywords: ["start", "set start", "hotel", "starting point", "begin"],
        a: "Click 'Set Start', then click anywhere on the map to place your starting point (e.g. your hotel). The route will begin from there."
      },
      {
        q: "How do multi-day plans work?",
        keywords: ["days", "day", "multi", "plan", "cluster", "group"],
        a: "Enter the number of days and click Apply. The app groups nearby attractions into the same day so you spend less time travelling between them."
      },
      {
        q: "Walking vs Driving mode?",
        keywords: ["walk", "drive", "driving", "walking", "mode", "car"],
        a: "Use the Mode dropdown to switch between walking and driving. The route and estimated time will update automatically."
      },
      {
        q: "How is the route calculated?",
        keywords: ["route", "order", "algorithm", "optimize", "path"],
        a: "The app uses a nearest-neighbour algorithm improved with 2-opt optimisation to find an efficient route that minimises backtracking."
      },
      {
        q: "How do I clear my itinerary?",
        keywords: ["clear", "reset", "delete", "remove", "empty"],
        a: "Click 'Clear Itinerary' to remove all saved places. You can then go back and swipe new attractions."
      },
      {
        q: "Why is there no route showing?",
        keywords: ["no route", "missing", "error", "not showing", "broken"],
        a: "A route needs at least 2 places in a day. Also check your internet connection since routing uses the OSRM online service."
      },
      {
        q: "How do I go back to swiping?",
        keywords: ["back", "swipe", "return", "home", "index"],
        a: "Click the '← Back' button in the top left to return to the swipe page."
      }
    ];

    const DEFAULT_SUGGESTIONS = [
      "What does Set Start do?",
      "How do multi-day plans work?",
      "Walking vs Driving mode?",
      "How is the route calculated?"
    ];

    // adds chat bubble to the map chat
    function addBubble(text, who){
      const div = document.createElement("div");
      div.className = "chat-bubble " + who;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // keyword matching for map chat answers
    function bestAnswer(userText){
      const t = (userText || "").toLowerCase();

      const exact = QA.find(x => x.q.toLowerCase() === t);
      if (exact) return exact.a;

      let best = null;
      let bestScore = 0;
      for (const item of QA){
        let score = 0;
        for (const kw of item.keywords){
          if (t.includes(kw)) score++;
        }
        if (score > bestScore){ bestScore = score; best = item; }
      }
      if (best && bestScore >= 1) return best.a;

      return "I can help with start points, multi-day plans, route modes, and clearing your itinerary. Try one of the suggested questions.";
    }

    // builds suggested question chips
    function renderSuggestions(){
      suggEl.innerHTML = "";
      DEFAULT_SUGGESTIONS.forEach((label) => {
        const b = document.createElement("button");
        b.className = "chat-chip";
        b.textContent = label;
        b.onclick = () => {
          addBubble(label, "user");
          addBubble(bestAnswer(label), "bot");
          suggEl.style.display = "none";
        };
        suggEl.appendChild(b);
      });
    }

    // opens chat
    function openChat(){
      panel.style.display = "flex";
      renderSuggestions();
      if (messagesEl.childElementCount === 0){
        addBubble("Hi! I can help with the map features. Ask me anything.", "bot");
      }
      inputEl.focus();
    }

    // closes chat
    function closeChat(){ panel.style.display = "none"; }

    // sends user text and bot reply
    function send(){
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      addBubble(text, "user");
      addBubble(bestAnswer(text), "bot");
    }

    fab.addEventListener("click", () => {
      if (panel.style.display === "none" || !panel.style.display) openChat();
      else closeChat();
    });

    closeBtn.addEventListener("click", closeChat);
    sendBtn.addEventListener("click", send);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") send();
      if (e.key === "Escape") closeChat();
    });

    if (helpBtn){
      helpBtn.onclick = () => {
        suggEl.style.display = (suggEl.style.display === "none") ? "flex" : "none";
      };
    }
  })();

  document.getElementById("btn-export-pdf").onclick = function () {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const priorities = JSON.parse(localStorage.getItem("priorities") || "[]");
    const mode = document.getElementById("travel-mode").value || "walking";
    const modeLabel = mode === "driving" ? "Driving" : "Walking";

    // header
    doc.setFont("helvetica", "bold");
    doc.setFontSize(20);
    doc.text("TravelSwipe Itinerary", 14, 20);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.setTextColor(100);
    doc.text(`City: ${selectedCity}   |   Mode: ${modeLabel}   |   Days: ${tripDays}`, 14, 30);
    doc.text(`Generated: ${new Date().toLocaleDateString("en-GB", { day:"numeric", month:"long", year:"numeric" })}`, 14, 37);

    doc.setDrawColor(200);
    doc.line(14, 41, 196, 41);

    let y = 50;

    dayPlan.forEach((dayObj) => {
      if (y > 260) { doc.addPage(); y = 20; }

      // day heading
      doc.setFont("helvetica", "bold");
      doc.setFontSize(13);
      doc.setTextColor(30, 58, 95);
      doc.text(`Day ${dayObj.day}  (${dayObj.places.length} place${dayObj.places.length !== 1 ? "s" : ""})`, 14, y);
      y += 7;

      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.setTextColor(40);

      const start = loadStartPoint();
      const ordered = getOptimizedVisitOrderFromStart(dayObj.places, start);

      ordered.forEach((place, i) => {
        if (place.id === "__start__") {
          y -= 6;
        } else {
          const isPri = priorities.includes(place.id);
          const star = isPri ? "* " : "";
          const line = `  ${i + 1 - (start ? 1 : 0)}. ${star}${place.name}  [${place.category || "Place"}]`;
          doc.text(line, 14, y);
        }
        y += 6;
        if (y > 270) { doc.addPage(); y = 20; }
      });

      y += 4;
      doc.setDrawColor(220);
      doc.line(14, y, 196, y);
      y += 8;
    });

    // footer note
    if (y > 260) { doc.addPage(); y = 20; }
    doc.setFontSize(9);
    doc.setTextColor(150);
    doc.text("Always verify opening times and local conditions before visiting.", 14, y);

    doc.save(`TravelSwipe_${selectedCity.replace(/\s+/g,"_")}_Itinerary.pdf`);
  };

</script>

</body>

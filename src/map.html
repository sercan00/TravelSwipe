<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TravelSwipe - Map</title>
  <link rel="stylesheet" href="style.css" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
      #map {
          height: 78vh;
          margin: 18px;
          border-radius: 14px;
          overflow: hidden;
          border: 1px solid rgba(248,250,252,0.2);
      }
      .mapbar{
          display:flex;
          align-items:center;
          justify-content:space-between;
          padding: 0 18px 12px;
          gap: 12px;
          flex-wrap: wrap;
      }
      .mapbar .left{
          display:flex;
          align-items:center;
          gap: 10px;
          flex-wrap: wrap;
      }
      .mapbar a, .mapbar button{
          padding: 10px 14px;
          border-radius: 10px;
          border: 1px solid #334155;
          background: #0b1220;
          color: #f8fafc;
          cursor: pointer;
          text-decoration:none;
          display:inline-block;
      }
      .mapbar a:hover, .mapbar button:hover{
          background:#1e293b;
          transform: translateY(-2px);
      }
      .meta{
          opacity:0.85;
      }

      #days-input{
          width: 84px;
          padding: 10px 12px;
          border-radius: 10px;
          border: 1px solid #334155;
          background: #0b1220;
          color: #f8fafc;
          outline: none;
      }
      .label{
          opacity: 0.85;
          font-weight: 600;
      }
      .day-btn.active{
          background:#1e293b;
      }
      #travel-mode {
          padding: 10px 12px;
          border-radius: 10px;
          border: 1px solid #334155;
          background: #0b1220;
          color: #f8fafc;
          outline: none;
          cursor: pointer;
      }
  </style>
</head>
<body>

<header class="topbar">
  <h1>Itinerary Map</h1>
  <button id="btn-theme" onclick="
    const current = localStorage.getItem('theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    this.textContent = next === 'light' ? '☀️' : '🌙';
  " style="padding:12px 16px; border-radius:14px; border:1px solid rgba(248,250,252,0.18); background:#111c32; color:#f8fafc; cursor:pointer; font-size:1.1rem;">🌙</button>
</header>

<div class="mapbar">
  <div class="left">
    <a href="index.html">← Back</a>
    <button id="btn-clear">Clear Itinerary</button>
    <button id="btn-fit">Fit to Markers</button>
    <button id="btn-set-start">Set Start</button>
    <button id="btn-clear-start">Clear Start</button>
  </div>
  <div class="meta" id="meta"></div>
</div>

<div class="mapbar" style="padding-top:0;">
  <div class="left" id="daybar"></div>
  <div class="left">
    <span class="label">Mode</span>
    <select id="travel-mode">
      <option value="walking">🚶 Walking</option>
      <option value="driving">🚗 Driving</option>
    </select>
    <span class="label" style="margin-left:12px;">Days</span>
    <input id="days-input" type="number" min="1" max="14" />
    <button id="btn-apply-days">Apply</button>
  </div>
</div>

<div id="map"></div>

<!-- Chat Assistant -->
<button id="chat-fab" aria-label="Open chat assistant" title="Help">
  💬
</button>

<section id="chat-panel" class="chat-panel" aria-label="Chat assistant" style="display:none;">
  <div class="chat-header">
    <div>
      <strong>TravelSwipe Assistant</strong><br />
      <span class="chat-subtitle">Map help & tips</span>
      <button id="chat-help" class="chat-help">Suggested questions</button>
    </div>
    <button id="chat-close" class="chat-close" aria-label="Close">✕</button>
  </div>

  <div id="chat-messages" class="chat-messages"></div>
  <div class="chat-suggestions" id="chat-suggestions"></div>

  <div class="chat-input">
    <input id="chat-text" type="text" placeholder="Ask something…" />
    <button id="chat-send">Send</button>
  </div>
</section>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="travel-data.js"></script>

<script>
  // ----- Load saved data safely -----
  const selectedCity = localStorage.getItem("selectedCity") || "London";
  const metaEl = document.getElementById("meta");

  function readLikedAttractions() {
    try {
      return JSON.parse(localStorage.getItem("likedAttractions") || "[]");
    } catch {
      return [];
    }
  }

  let liked = [];
  let points = [];

  function refreshStoredPoints() {
    liked = readLikedAttractions();

    points = liked
      .filter(p => p && p.lat !== undefined && p.lng !== undefined)
      .map(p => ({
        ...p,
        lat: Number(p.lat),
        lng: Number(p.lng)
      }))
      .filter(p => Number.isFinite(p.lat) && Number.isFinite(p.lng));

    metaEl.textContent = `${selectedCity} • ${liked.length} saved place(s)`;
  }

  refreshStoredPoints();

  const fallbackCenter = {
    London: [51.5074, -0.1278],
    "New York": [40.7128, -74.0060],
    Tokyo: [35.6762, 139.6503],
    Istanbul: [41.0082, 28.9784],
    Oslo: [59.9139, 10.7522],
    Rio: [-22.9068, -43.1729]
  };

  const center = fallbackCenter[selectedCity] || [51.5074, -0.1278];
  const map = L.map("map").setView(center, 12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  // ----- Days / Plan state -----
  let tripDays = Number(localStorage.getItem("tripDays") || "1");
  if (!Number.isFinite(tripDays) || tripDays < 1) tripDays = 1;
  tripDays = Math.min(14, tripDays);

  const daysInput = document.getElementById("days-input");
  daysInput.value = String(tripDays);

  let activeDay = 1;
  let dayPlan = [];
  let markersLayer = L.layerGroup().addTo(map);
  let routeLine = null;
  let startMarker = null;
  let isPlacingStart = false;
  const startKey = `startPoint:${selectedCity}`;

  // ----- Helpers -----
  function euclid(a, b){
    const dx = a.lng - b.lng;
    const dy = a.lat - b.lat;
    return Math.sqrt(dx*dx + dy*dy);
  }

  function loadStartPoint() {
    try {
      const raw = localStorage.getItem(startKey);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (typeof obj.lat !== "number" || typeof obj.lng !== "number") return null;
      return { lat: obj.lat, lng: obj.lng };
    } catch {
      return null;
    }
  }

  function saveStartPoint(latlng) {
    localStorage.setItem(startKey, JSON.stringify({ lat: latlng.lat, lng: latlng.lng }));
  }

  function clearStartPoint() {
    localStorage.removeItem(startKey);
    if (startMarker) {
      map.removeLayer(startMarker);
      startMarker = null;
    }
  }

  function setStartMarker(latlng) {
    if (!startMarker) {
      startMarker = L.marker([latlng.lat, latlng.lng], { draggable: true }).addTo(map);
      startMarker.bindPopup("<b>Start point</b><br>Drag to adjust.").openPopup();

      startMarker.on("dragend", () => {
        const p = startMarker.getLatLng();
        saveStartPoint(p);
        drawDay(activeDay);
      });
    } else {
      startMarker.setLatLng([latlng.lat, latlng.lng]);
    }

    saveStartPoint(latlng);
  }

  // ----- Day clustering -----
  function clusterByCloseness(pts, k) {
    if (!pts || pts.length === 0) return [];
    k = Math.max(1, Math.min(k, pts.length));

    let clusters = pts.map(p => ({ places: [p] }));

    function centroid(c) {
      const n = c.places.length;
      const lat = c.places.reduce((s,p)=>s+p.lat,0) / n;
      const lng = c.places.reduce((s,p)=>s+p.lng,0) / n;
      return { lat, lng };
    }

    function clusterDist(a, b) {
      const ca = centroid(a), cb = centroid(b);
      return euclid(ca, cb);
    }

    while (clusters.length > k) {
      let bestI = 0, bestJ = 1, bestD = Infinity;

      for (let i = 0; i < clusters.length; i++) {
        for (let j = i + 1; j < clusters.length; j++) {
          const d = clusterDist(clusters[i], clusters[j]);
          if (d < bestD) {
            bestD = d;
            bestI = i;
            bestJ = j;
          }
        }
      }

      clusters[bestI].places = clusters[bestI].places.concat(clusters[bestJ].places);
      clusters.splice(bestJ, 1);
    }

    const ordered = clusters
      .map(c => {
        const ctd = centroid(c);
        return { places: c.places, centroid: ctd };
      })
      .sort((a,b) => b.centroid.lat - a.centroid.lat);

    return ordered.map((c, idx) => ({
      day: idx + 1,
      centroid: c.centroid,
      places: c.places
    }));
  }

  // ----- Routing -----
  function centroidOf(list){
    const n = list.length || 1;
    const lat = list.reduce((s,p)=>s+p.lat,0) / n;
    const lng = list.reduce((s,p)=>s+p.lng,0) / n;
    return { lat, lng };
  }

  function pickStartClosestToCentroid(list){
    if (!list || list.length === 0) return null;
    const c = centroidOf(list);
    let best = list[0];
    let bestD = Infinity;
    for (const p of list){
      const d = euclid(p, c);
      if (d < bestD){ bestD = d; best = p; }
    }
    return best;
  }

  function nearestNeighborOrder(list){
    if (!list || list.length <= 2) return (list || []).slice();

    const remaining = list.slice();
    const ordered = [];

    const start = pickStartClosestToCentroid(remaining);
    ordered.push(start);
    remaining.splice(remaining.findIndex(p => p.id === start.id), 1);

    while (remaining.length){
      const last = ordered[ordered.length - 1];
      let bestIdx = 0;
      let bestD = Infinity;

      for (let i = 0; i < remaining.length; i++){
        const d = euclid(last, remaining[i]);
        if (d < bestD){ bestD = d; bestIdx = i; }
      }
      ordered.push(remaining.splice(bestIdx, 1)[0]);
    }
    return ordered;
  }

  function routeLength(list){
    let sum = 0;
    for (let i = 0; i < list.length - 1; i++){
      sum += euclid(list[i], list[i+1]);
    }
    return sum;
  }

  function twoOptImprove(route, maxPasses = 8){
    const r = route.slice();
    if (r.length < 4) return r;

    let improved = true;
    let passes = 0;

    while (improved && passes < maxPasses){
      improved = false;
      passes++;

      for (let i = 1; i < r.length - 2; i++){
        for (let k = i + 1; k < r.length - 1; k++){
          const a = r[i - 1], b = r[i];
          const c = r[k], d = r[k + 1];

          const current = euclid(a,b) + euclid(c,d);
          const swapped = euclid(a,c) + euclid(b,d);

          if (swapped < current){
            const segment = r.slice(i, k + 1).reverse();
            r.splice(i, segment.length, ...segment);
            improved = true;
          }
        }
      }
    }

    return r;
  }

  function getOptimizedVisitOrder(list){
    const nn = nearestNeighborOrder(list);
    const improved = twoOptImprove(nn);
    return routeLength(improved) <= routeLength(nn) ? improved : nn;
  }

  function getOptimizedVisitOrderFromStart(list, startLatLng) {
    if (!startLatLng) return getOptimizedVisitOrder(list);

    const startPoint = { id: "__start__", lat: startLatLng.lat, lng: startLatLng.lng };

    const nn = (function nearestNeighborFromStart() {
      if (!list || list.length === 0) return [startPoint];

      const remaining = list.slice();
      const ordered = [startPoint];

      while (remaining.length) {
        const last = ordered[ordered.length - 1];
        let bestIdx = 0;
        let bestD = Infinity;

        for (let i = 0; i < remaining.length; i++) {
          const d = euclid(last, remaining[i]);
          if (d < bestD) { bestD = d; bestIdx = i; }
        }
        ordered.push(remaining.splice(bestIdx, 1)[0]);
      }
      return ordered;
    })();

    const improved = (function twoOptFixedStart(route, maxPasses = 8) {
      const r = route.slice();
      if (r.length < 5) return r;

      let improved = true;
      let passes = 0;

      while (improved && passes < maxPasses) {
        improved = false;
        passes++;

        for (let i = 2; i < r.length - 2; i++) {
          for (let k = i + 1; k < r.length - 1; k++) {
            const a = r[i - 1], b = r[i];
            const c = r[k], d = r[k + 1];

            const current = euclid(a, b) + euclid(c, d);
            const swapped = euclid(a, c) + euclid(b, d);

            if (swapped < current) {
              const segment = r.slice(i, k + 1).reverse();
              r.splice(i, segment.length, ...segment);
              improved = true;
            }
          }
        }
      }
      return r;
    })(nn);

    return improved;
  }

  function clearMap(){
    markersLayer.clearLayers();
    if (routeLine) map.removeLayer(routeLine);
    routeLine = null;
  }

  function fitToList(list){
    if (!list || list.length === 0) return;

    const b = list.map(p => [p.lat, p.lng]);

    const start = loadStartPoint();
    if (start) b.push([start.lat, start.lng]);

    map.fitBounds(L.latLngBounds(b), { padding: [40, 40] });
  }

  async function drawRouteForList(list){
    if (!list || list.length < 2) return;

    const start = loadStartPoint();
    const ordered = getOptimizedVisitOrderFromStart(list, start);

    const coords = ordered.map(p => `${p.lng},${p.lat}`).join(";");
    const mode = document.getElementById("travel-mode").value || "walking";
    const url = `https://router.project-osrm.org/route/v1/${mode}/${coords}?overview=full&geometries=geojson`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      if (!data.routes || !data.routes[0] || !data.routes[0].geometry) return;

      if (routeLine) map.removeLayer(routeLine);

      routeLine = L.geoJSON(data.routes[0].geometry, {
        style: { weight: 5, opacity: 0.85 }
      }).addTo(map);

      const dMeters = data.routes[0].distance;
      const mode2 = document.getElementById("travel-mode").value || "walking";
      const speedMps = mode2 === "driving" ? 8.33 : 1.3889;
      const mins = Math.round((dMeters / speedMps) / 60);
      const km = (dMeters / 1000).toFixed(2);
      const modeLabel = mode2 === "driving" ? "drive" : "walk";

      metaEl.textContent = `${selectedCity} • ${liked.length} saved • Day ${activeDay}: ${km} km (~${mins} min ${modeLabel})`;
    } catch (e) {
      console.error("Route error:", e);
    }
  }

  function drawDay(dayNumber){
    clearMap();

    const dayObj = dayPlan.find(d => d.day === dayNumber);
    if (!dayObj || dayObj.places.length === 0){
      metaEl.textContent = `${selectedCity} • ${liked.length} saved • Day ${dayNumber}: no places`;
      return;
    }

    dayObj.places.forEach((p, i) => {
      const marker = L.marker([p.lat, p.lng]).addTo(markersLayer);
      const safeId = encodeURIComponent(p.id);

      marker.bindPopup(`
  <div style="max-width:220px;">
    <img src="${p.image || ''}" style="width:100%; height:120px; object-fit:cover; border-radius:8px; margin-bottom:8px;" />
    <b>${i + 1}. ${p.name}</b><br>
    <span style="opacity:0.7; font-size:12px;">${p.category || ""}</span><br>
    <span style="font-size:13px; line-height:1.4;">${p.description || ""}</span><br><br>
    <a href="index.html" class="open-in-app" data-id="${safeId}" style="color:#3b82f6; font-weight:600;">Open in app</a>
  </div>
`);

      marker.on("popupopen", () => {
        const link = document.querySelector('.open-in-app[data-id="' + safeId + '"]');
        if (!link) return;

        link.addEventListener("click", () => {
          localStorage.setItem("jumpToAttractionId", String(p.id));
          localStorage.setItem("selectedCity", selectedCity);
        });
      });
    });

    fitToList(dayObj.places);
    drawRouteForList(dayObj.places);
  }

  function renderDayBar(){
    const daybar = document.getElementById("daybar");
    daybar.innerHTML = "";

    dayPlan.forEach((d) => {
      const btn = document.createElement("button");
      btn.className = "day-btn" + (d.day === activeDay ? " active" : "");
      btn.textContent = `Day ${d.day} (${d.places.length})`;

      btn.onclick = () => {
        activeDay = d.day;
        renderDayBar();
        drawDay(activeDay);
      };

      daybar.appendChild(btn);
    });

    if (dayPlan.length === 0) {
      const span = document.createElement("span");
      span.style.opacity = "0.8";
      span.textContent = "No places to plan yet.";
      daybar.appendChild(span);
    }
  }
  // Apply saved theme
  const savedTheme = localStorage.getItem("theme") || "dark";
  document.documentElement.setAttribute("data-theme", savedTheme);
  const themeToggle = document.getElementById("btn-theme");
  if (themeToggle) themeToggle.textContent = savedTheme === "light" ? "☀️" : "🌙";


  function rebuildPlan(){
    refreshStoredPoints();
    dayPlan = clusterByCloseness(points, tripDays);
    activeDay = 1;
    renderDayBar();

    if (dayPlan.length > 0) {
      drawDay(activeDay);
    } else {
      metaEl.textContent = `${selectedCity} • ${liked.length} saved place(s)`;
    }
  }

  // ----- Buttons -----
  document.getElementById("btn-fit").onclick = () => {
    const dayObj = dayPlan.find(d => d.day === activeDay);
    if (dayObj) fitToList(dayObj.places);
  };

  document.getElementById("btn-clear").onclick = () => {
    localStorage.setItem("likedAttractions", "[]");
    if (window.TravelSwipeDB) {
      window.TravelSwipeDB.saveCurrentSession();
    }
    window.location.reload();
  };

  document.getElementById("btn-apply-days").onclick = () => {
    const v = Math.max(1, Math.min(14, Number(daysInput.value || 1)));
    tripDays = v;
    localStorage.setItem("tripDays", String(v));
    rebuildPlan();

    if (window.TravelSwipeDB) {
      window.TravelSwipeDB.saveCurrentSession();
    }
  };

  // Travel mode toggle
  const travelModeSelect = document.getElementById("travel-mode");
  const savedMode = localStorage.getItem("travelMode") || "walking";
  travelModeSelect.value = savedMode;

  travelModeSelect.addEventListener("change", () => {
    localStorage.setItem("travelMode", travelModeSelect.value);
    if (window.TravelSwipeDB) window.TravelSwipeDB.saveCurrentSession();
    drawDay(activeDay);
  });

  // ----- Init -----
  rebuildPlan();

  if (points.length === 0) {
    alert("No saved places with coordinates yet. Like some attractions first.");
  }

  const savedStart = loadStartPoint();
  if (savedStart) setStartMarker(savedStart);

  document.getElementById("btn-set-start").onclick = () => {
    isPlacingStart = !isPlacingStart;
    alert(isPlacingStart ? "Click on the map to set the start point." : "Start point placement cancelled.");
  };

  document.getElementById("btn-clear-start").onclick = () => {
    clearStartPoint();
    drawDay(activeDay);
  };

  map.on("click", (e) => {
    if (!isPlacingStart) return;
    setStartMarker(e.latlng);
    isPlacingStart = false;
    drawDay(activeDay);
  });

  // --- Map Chat Assistant ---
  (function initMapChat(){
    const fab = document.getElementById("chat-fab");
    const panel = document.getElementById("chat-panel");
    const closeBtn = document.getElementById("chat-close");
    const messagesEl = document.getElementById("chat-messages");
    const inputEl = document.getElementById("chat-text");
    const sendBtn = document.getElementById("chat-send");
    const suggEl = document.getElementById("chat-suggestions");
    const helpBtn = document.getElementById("chat-help");

    if (!fab || !panel || !messagesEl || !inputEl || !sendBtn || !suggEl || !closeBtn) return;

    const QA = [
      {
        q: "What does Set Start do?",
        keywords: ["start", "set start", "hotel", "starting point", "begin"],
        a: "Click 'Set Start', then click anywhere on the map to place your starting point (e.g. your hotel). The route will begin from there."
      },
      {
        q: "How do multi-day plans work?",
        keywords: ["days", "day", "multi", "plan", "cluster", "group"],
        a: "Enter the number of days and click Apply. The app groups nearby attractions into the same day so you spend less time travelling between them."
      },
      {
        q: "Walking vs Driving mode?",
        keywords: ["walk", "drive", "driving", "walking", "mode", "car"],
        a: "Use the Mode dropdown to switch between walking and driving. The route and estimated time will update automatically."
      },
      {
        q: "How is the route calculated?",
        keywords: ["route", "order", "algorithm", "optimize", "path"],
        a: "The app uses a nearest-neighbour algorithm improved with 2-opt optimisation to find an efficient route that minimises backtracking."
      },
      {
        q: "How do I clear my itinerary?",
        keywords: ["clear", "reset", "delete", "remove", "empty"],
        a: "Click 'Clear Itinerary' to remove all saved places. You can then go back and swipe new attractions."
      },
      {
        q: "Why is there no route showing?",
        keywords: ["no route", "missing", "error", "not showing", "broken"],
        a: "A route needs at least 2 places in a day. Also check your internet connection since routing uses the OSRM online service."
      },
      {
        q: "How do I go back to swiping?",
        keywords: ["back", "swipe", "return", "home", "index"],
        a: "Click the '← Back' button in the top left to return to the swipe page."
      }
    ];

    const DEFAULT_SUGGESTIONS = [
      "What does Set Start do?",
      "How do multi-day plans work?",
      "Walking vs Driving mode?",
      "How is the route calculated?"
    ];

    function addBubble(text, who){
      const div = document.createElement("div");
      div.className = "chat-bubble " + who;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function bestAnswer(userText){
      const t = (userText || "").toLowerCase();

      const exact = QA.find(x => x.q.toLowerCase() === t);
      if (exact) return exact.a;

      let best = null;
      let bestScore = 0;
      for (const item of QA){
        let score = 0;
        for (const kw of item.keywords){
          if (t.includes(kw)) score++;
        }
        if (score > bestScore){ bestScore = score; best = item; }
      }
      if (best && bestScore >= 1) return best.a;

      return "I can help with start points, multi-day plans, route modes, and clearing your itinerary. Try one of the suggested questions.";
    }

    function renderSuggestions(){
      suggEl.innerHTML = "";
      DEFAULT_SUGGESTIONS.forEach((label) => {
        const b = document.createElement("button");
        b.className = "chat-chip";
        b.textContent = label;
        b.onclick = () => {
          addBubble(label, "user");
          addBubble(bestAnswer(label), "bot");
          suggEl.style.display = "none";
        };
        suggEl.appendChild(b);
      });
    }

    function openChat(){
      panel.style.display = "flex";
      renderSuggestions();
      if (messagesEl.childElementCount === 0){
        addBubble("Hi! I can help with the map features. Ask me anything.", "bot");
      }
      inputEl.focus();
    }

    function closeChat(){ panel.style.display = "none"; }

    function send(){
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      addBubble(text, "user");
      addBubble(bestAnswer(text), "bot");
    }

    fab.addEventListener("click", () => {
      if (panel.style.display === "none" || !panel.style.display) openChat();
      else closeChat();
    });

    closeBtn.addEventListener("click", closeChat);
    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") send();
      if (e.key === "Escape") closeChat();
    });

    if (helpBtn){
      helpBtn.onclick = () => {
        suggEl.style.display = (suggEl.style.display === "none") ? "flex" : "none";
      };
    }
  })();

</script>

</body>
</html>
